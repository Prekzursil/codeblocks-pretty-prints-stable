version = 1

# Keep this file explicit so provider-side analysis re-reads repo scope
# changes. Mirrors env-inspector/.deepsource.toml — the canonical
# Python-stack layout used across the Prekzursil fleet.

exclude_patterns = [
  "build/**",
  "dist/**",
  "node_modules/**",
  "overlay/profile-seed/**",
  "packaging/**",
  "manifests/**",
  "docs/**",
  "tests/**",
  "scripts/**/*.test.mjs",
]

test_patterns = [
  "tests/**",
  "scripts/**/*.test.mjs",
]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.x.x"
  max_line_length = 180
  skip_doc_coverage = ["module", "magic", "init", "class", "nonpublic"]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["nodejs", "browser"]
  module_system = "es-modules"
  skip_doc_coverage = [
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "function-declaration",
    "function-expression",
    "method-definition",
  ]

[[analyzers]]
name = "secrets"
enabled = true

[[analyzers]]
name = "shell"
enabled = true

[[analyzers]]
name = "test-coverage"
enabled = true
