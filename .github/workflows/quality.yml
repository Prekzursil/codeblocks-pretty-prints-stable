name: quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    # Lean 6-gate charter (decided 2026-06-16). ADDITIVE: this runs alongside the
    # existing quality-zero-platform fleet workflows; no SaaS gate is removed here.
    # Pinned to the template branch so this PR's CI is real now; the runbook
    # re-pins to a tag once the template lands on the platform default branch.
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality.yml@feat/lean-quality-template
