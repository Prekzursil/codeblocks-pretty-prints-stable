name: Quality Zero Gate

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  aggregate-gate:
    permissions:
      contents: read
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality-zero-gate.yml@139144c8a17e93ba617c6b44e8f71e76a9deca3f
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 139144c8a17e93ba617c6b44e8f71e76a9deca3f
