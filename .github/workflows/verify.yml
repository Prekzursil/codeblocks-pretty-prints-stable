name: Verify

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run repository verification
        run: bash scripts/verify
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-reports
          path: |
            build/coverage.xml
            build/coverage.json
            build/notice-inventory.json

