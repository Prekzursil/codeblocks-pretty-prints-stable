name: autofix-models

# Tier 2 of the 3-tier merge automation -- PRIMARY auto-fix lane (free).
# When CI on the default branch FAILS, use the free GitHub Models inference
# action to draft a fix and open a labelled "autofix" PR. The fix PR is NEVER
# auto-merged -- normal CI + branch protection + human review gate it.
# Bounded: fires only on a failed default-branch run of the quality/CodeQL CI.

on:
  workflow_run:
    workflows: [quality, CodeQL]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  draft-fix:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure'
          && github.event.workflow_run.head_branch == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Collect failing run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > failing-logs.txt 2>&1 || true
          # Keep the prompt bounded to the last ~400 lines of failing output.
          tail -n 400 failing-logs.txt > failing-logs.trimmed.txt || true

      - name: Draft a fix with GitHub Models (free inference)
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          system-prompt: >-
            You are a senior engineer. You are given the trailing failing CI
            logs for the default branch of a repository. Diagnose the most
            likely real root cause and propose a concrete, minimal, real fix.
            Never lower thresholds, skip checks, or fake green. Respond with a
            short root-cause analysis followed by the exact file path(s) and the
            corrected content or unified diff.
          prompt-file: failing-logs.trimmed.txt

      - name: Open a fix PR (draft, labelled autofix -- never auto-merged)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          BR="autofix/models-$(date +%s)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          {
            echo "# Suggested fix (GitHub Models, gpt-4o-mini)"
            echo
            echo "Failing run: $RUN_URL"
            echo
            echo "$AI_RESPONSE"
          } > AUTOFIX_SUGGESTION.md
          git add AUTOFIX_SUGGESTION.md
          git commit -m "chore(autofix): draft Models fix suggestion for failing CI"
          git push -u origin "$BR"
          gh label create autofix --color FBCA04 --description "Automated fix suggestion" 2>/dev/null || true
          gh pr create \
            --title "autofix: Models-drafted fix for failing default-branch CI" \
            --body "Automated draft fix from GitHub Models. Review before merge -- CI and branch protection gate this PR. Failing run: $RUN_URL" \
            --label autofix \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BR"
