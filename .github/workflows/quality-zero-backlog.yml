name: Quality Zero Backlog

permissions: {}

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backlog-sweep:
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-backlog-sweep.yml@139144c8a17e93ba617c6b44e8f71e76a9deca3f
    with:
      repo_slug: ${{ github.repository }}
      lane: quality
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

