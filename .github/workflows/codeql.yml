name: CodeQL

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

jobs:
  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-codeql.yml@32a1fb2b863a4a007598950772e5422537812809
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: main
