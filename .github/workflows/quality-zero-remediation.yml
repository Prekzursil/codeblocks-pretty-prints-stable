name: Quality Zero Remediation

permissions: {}

on:
  workflow_run: # zizmor: ignore[dangerous-triggers] -- trusted private runner remediation only responds to internal gate failures.
    workflows: ["Quality Zero Gate"]
    types: [completed]
  workflow_dispatch:

jobs:
  remediate:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: write
      pull-requests: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-remediation-loop.yml@07703d5eb1a6c7a2a9a478f2b1cea9702788ad63
    with:
      repo_slug: ${{ github.repository }}
      failure_context: Quality Zero Gate
      sha: ${{ github.event.workflow_run.head_sha || github.sha }}
    secrets:
      CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}

