name: Bug report
description: Report a problem with the packaged edition, installer, or migration flow.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please use this form for reproducible issues in the packaged edition.
  - type: input
    id: release
    attributes:
      label: Release or build
      description: The release tag, build number, or commit hash.
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area affected
      options:
        - Installer
        - Upgrade / migration
        - Compiler / linker selection
        - Debugger / pretty-printers
        - Notices / release metadata
        - Documentation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / notes
      description: Include installer logs, release-manifest details, or screenshots if available.
  - type: checkboxes
    id: hygiene
    attributes:
      label: Hygiene
      options:
        - label: I did not include secrets, tokens, or private credentials.
          required: true
