# Codeblocks Pretty Prints Stable Workflow Bring Code And Tests To Strict Analyzer State

## Action

Follow the bring-code-and-tests-to-strict-analyzer-state workflow:
1. Add or update docstrings for modules, functions, and classes in both source and test files.
2. Wrap lines to the configured line length limit (e.g., 100 chars).
3. Fix type annotations and mypy errors (e.g., Optionals, imports).
4. Update or add linter configurations (e.g., .pylintrc, setup.cfg, flake8 config).
5. Refactor code to comply with linter rules (e.g., argument/local limits, import resolution).
6. Make test directory a package if needed for import resolution.
7. Extract or refactor shared fixtures/utilities in tests.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: scripts/*.py, scripts/quality/*.py, tests/*.py

