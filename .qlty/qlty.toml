# This file was originally generated by ``qlty init`` and has been
# extended to match the conventions used across the Prekzursil fleet
# (see env-inspector/.qlty/qlty.toml for the canonical layout).
#
# This configuration is used by both Qlty CLI and Qlty Cloud.
#
#     Qlty CLI -- Code quality toolkit for developers
#     Qlty Cloud -- Fully automated Code Health Platform
#
# Try Qlty Cloud: https://qlty.sh
#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/*.d.ts",
  "**/.yarn/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/testdata/**",
  "**/vendor/**",
  "**/assets/**",
  # Repo-specific: the overlay/profile-seed tree mirrors Code::Blocks
  # default profile XML/JSON. These files are vendored upstream assets
  # — they're already excluded by sonar-project.properties for the same
  # reason. Qlty would otherwise smell their style as repo code.
  "overlay/profile-seed/**",
  "packaging/**/*.lock",
  "manifests/**/*.lock",
  "release-manifest.json",
]

test_patterns = [
  "**/test/**",
  "**/tests/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "block"

[[source]]
name = "default"
default = true
