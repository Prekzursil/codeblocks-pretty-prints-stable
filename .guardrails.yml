# GuardRails configuration
# Reference: https://docs.guardrails.io/docs/configuration
#
# Bounds the org-installed GuardRails App's scan to source code so its
# status check converges (excluding build output, generated artifacts,
# vendored profile seeds, packaging manifests, and tests). All
# analyzers stay enabled with default rules; no findings are silenced.

version: 1

ignore-paths:
  - build
  - dist
  - node_modules
  - overlay/profile-seed
  - packaging
  - manifests
  - docs
  - "**/build/**"
  - "**/dist/**"
  - "**/node_modules/**"
  - "tests/**"
  - "scripts/**/*.test.mjs"

engines:
  python:
    enabled: true
    secrets:
      enabled: true
    sast:
      enabled: true
  javascript:
    enabled: true
    secrets:
      enabled: true
    sast:
      enabled: true
  general:
    secrets:
      enabled: true
    vulnerable_dependencies:
      enabled: true
