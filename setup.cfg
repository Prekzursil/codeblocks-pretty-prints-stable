# flake8 configuration.
#
# The project's line-length standard is 100 characters, matching the
# active pylint gate (.pylintrc) and SonarCloud configuration. The
# default flake8 limit of 79 predates this repo's conventions and would
# disagree with every other configured analyzer, so it is aligned here.
[flake8]
max-line-length = 100
extend-exclude =
    .venv,
    build,
    dist,
    overlay/profile-seed
